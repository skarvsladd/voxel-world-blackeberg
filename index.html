<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel World: Blackeberg</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>Voxel world: Blackeberg</strong><br>
        Klicka för att låsa musen. WASD för att röra dig, vänsterklick för att ta bort block, högerklick för att lägga till block.
    </div>
    <!-- Load the game script as an ES module; it will import Three.js and controls from CDN -->
    <script type="module" src="./script.js"></script>
</body>
</html>
